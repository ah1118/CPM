<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aircraft Loader</title>

<style>
    body {
        font-family: Arial;
        background: #111;
        color: #fff;
        text-align: center;
    }

    .hidden {
        display: none;
    }

    #aircraftPopup {
        margin-top: 100px;
    }

    select, input, button {
        padding: 10px;
        margin: 5px;
        font-size: 16px;
    }

    #appWrapper {
        margin-top: 40px;
    }

    #deckTitle {
        font-size: 20px;
        margin-top: 10px;
    }
</style>
</head>

<body>

<!-- =========================
     STARTUP POPUP
========================= -->
<div id="aircraftPopup">
    <h2>Select Aircraft</h2>

    <select id="aircraftSelect">
        <option value="">-- Select Aircraft --</option>
        <option value="EC-NOG">EC-NOG</option>
        <option value="EC-NOF">EC-NOF</option>
        <option value="EC-NYJ">EC-NYJ</option>
        <option value="EC-ODQ">EC-ODQ</option>
        <option value="EC-ODR">EC-ODR</option> <!-- ✅ NEW -->
    </select>

    <br>

    <input id="flightNumber" placeholder="Flight Number (e.g. AH1234)">
    <br>

    <select id="flightDestination">
        <option value="">-- Destination --</option>
        <option value="ALG">ALG</option>
        <option value="CDG">CDG</option>
        <option value="IST">IST</option>
    </select>

    <br>

    <button id="loadAircraftPopupBtn">Load Aircraft</button>
</div>


<!-- =========================
     MAIN APP
========================= -->
<div id="appWrapper" class="hidden">
    <h2 id="aircraftNameBox"></h2>
    <div id="deckTitle"></div>

    <p>Main UI loaded ✔</p>
</div>


<script>
/* ==========================================================
   MOCK AIRCRAFT PROFILES (MINIMAL)
========================================================== */

const aircraft_ECNOG = { registration: "EC-NOG", type: "A330-300", ldm:{seatCode:"Y408"} };
const aircraft_ECNOF = { registration: "EC-NOF", type: "A330-300", ldm:{seatCode:"Y408"} };
const aircraft_ECNYJ = { registration: "EC-NYJ", type: "A330-300", ldm:{seatCode:"Y408"} };
const aircraft_ECODQ = { registration: "EC-ODQ", type: "A330-300", ldm:{seatCode:"Y408"} };
const aircraft_ECODR = { registration: "EC-ODR", type: "A330-300", ldm:{seatCode:"Y408"} }; // ✅ NEW


/* ==========================================================
   STARTUP LOGIC
========================================================== */

window.addEventListener("DOMContentLoaded", () => {

    // Force uppercase flight number
    document.getElementById("flightNumber").addEventListener("input", function () {
        this.value = this.value.toUpperCase();
    });

    const loadBtn = document.getElementById("loadAircraftPopupBtn");

    loadBtn.addEventListener("click", () => {

        const acft = document.getElementById("aircraftSelect").value;
        const flightNo = document.getElementById("flightNumber").value.trim();
        const dest = document.getElementById("flightDestination").value;

        if (!acft) return alert("Select an aircraft.");
        if (!flightNo) return alert("Enter flight number.");
        if (!dest) return alert("Select a destination.");

        /* =========================
           CLEAN AIRCRAFT MAP
        ========================= */
        const AIRCRAFTS = {
            "EC-NOG": aircraft_ECNOG,
            "EC-NOF": aircraft_ECNOF,
            "EC-NYJ": aircraft_ECNYJ,
            "EC-ODQ": aircraft_ECODQ,
            "EC-ODR": aircraft_ECODR // ✅ HERE
        };

        if (!AIRCRAFTS[acft]) {
            alert("Aircraft profile missing.");
            return;
        }

        window.aircraft = AIRCRAFTS[acft];

        /* =========================
           STORE FLIGHT DATA
        ========================= */
        window.flightData = {
            flightNo,
            destination: dest
        };

        /* =========================
           SHOW MAIN UI
        ========================= */
        document.getElementById("aircraftPopup").classList.add("hidden");
        document.getElementById("appWrapper").classList.remove("hidden");

        /* =========================
           UPDATE HEADER
        ========================= */
        document.getElementById("aircraftNameBox").innerText =
            `${window.aircraft.registration} (${window.aircraft.type})`;

        document.getElementById("deckTitle").innerText =
            `${flightNo} → ${dest} — ${window.aircraft.registration}`;

        /* =========================
           INIT PLACEHOLDER
        ========================= */
        console.log("Aircraft loaded:", window.aircraft);
    });
});
</script>

</body>
</html>
